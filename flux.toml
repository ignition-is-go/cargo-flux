[channels]
main = "production"

[tasks.build]
cargo = ["cargo", "build"]
npm = ["npm", "run", "build"]
uv = ["uv", "run", "python", "-m", "build"]

[tasks.test]
cargo = ["cargo", "test"]
npm = ["npm", "test"]
uv = ["uv", "run", "pytest"]

[tasks.lint]
cargo = ["cargo", "clippy", "--all-targets", "--all-features", "--", "-D", "warnings"]
npm = ["npm", "run", "lint"]
uv = ["uv", "run", "ruff", "check", "."]

[tasks.release]
cargo = "VERSION=$(cargo flux version) && cargo flux stamp \"$VERSION\" && cargo update --workspace && cargo fmt --all && git add -A && git commit -m \"chore(release): $VERSION\" && git tag \"v$VERSION\" -m \"Release $VERSION\" && git push origin HEAD \"v$VERSION\" && cargo publish && gh release create \"v$VERSION\" --verify-tag --title \"v$VERSION\" --generate-notes"
